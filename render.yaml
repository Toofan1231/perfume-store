services:
  - type: web
    name: luxora-perfume-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_NAME
        value: Luxora Perfume API
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_ORIGINS
        value: https://oders.netlify.app
